<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFオフィスツール | python-office活用</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-4"><i class="fas fa-file-pdf text-danger"></i> PDFオフィスツール</h1>
            <p class="lead">python-officeライブラリを利用したPDF処理ツール</p>
        </header>

        <div class="row">
            <!-- 左側: アップロードエリア -->
            <div class="col-md-5 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <i class="fas fa-cloud-upload-alt"></i> PDFアップロード
                    </div>
                    <div class="card-body">
                        <div id="drop-area" class="drop-area">
                            <i class="fas fa-file-pdf fa-3x mb-2"></i>
                            <p>PDFファイルをドラッグ＆ドロップ、またはクリックして選択</p>
                            <input type="file" id="file-input" accept=".pdf" style="display:none">
                            <button class="btn btn-outline-primary mt-2" onclick="event.stopPropagation(); document.getElementById('file-input').click()">ファイルを選択</button>
                        </div>
                        <div id="file-info" class="mt-3" style="display:none;">
                            <div class="alert alert-success">
                                <i class="fas fa-check-circle"></i> アップロード済み: <strong id="upload-filename"></strong>
                                <button class="btn-close float-end" onclick="resetFile()"></button>
                            </div>
                        </div>
                        <hr>
                        <label class="form-label"><i class="fas fa-object-group"></i> 複数PDFを結合</label>
                        <input type="file" id="merge-input" class="form-control" accept=".pdf" multiple>
                        <button id="merge-btn" class="btn btn-success w-100 mt-2" disabled>結合実行</button>
                    </div>
                </div>
            </div>

            <!-- 右側: 機能パネル -->
            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white">
                        <i class="fas fa-tools"></i> 処理メニュー
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-6 col-md-4">
                                <button class="btn btn-outline-info w-100" data-action="to_word">
                                    <i class="fas fa-file-word"></i> Word変換
                                </button>
                            </div>
                            <div class="col-6 col-md-4">
                                <div class="btn-group w-100">
                                    <button class="btn btn-outline-success" data-action="to_images" data-merge="false">
                                        <i class="fas fa-images"></i> 画像変換(複数)
                                    </button>
                                    <button class="btn btn-outline-success" data-action="to_images" data-merge="true">
                                        <i class="fas fa-image"></i> 長画像変換
                                    </button>
                                </div>
                            </div>
                            <div class="col-6 col-md-4">
                                <button class="btn btn-outline-warning w-100" data-action="split" data-bs-toggle="modal" data-bs-target="#splitModal">
                                    <i class="fas fa-cut"></i> 分割
                                </button>
                            </div>
                            <div class="col-6 col-md-4">
                                <button class="btn btn-outline-danger w-100" data-action="watermark" data-bs-toggle="modal" data-bs-target="#watermarkModal">
                                    <i class="fas fa-water"></i> 透かし追加
                                </button>
                            </div>
                        </div>

                        <div id="progress" class="mt-4" style="display:none;">
                            <div class="progress">
                                <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%">処理中...</div>
                            </div>
                        </div>
                        <div id="result" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 分割設定モーダル -->
    <div class="modal fade" id="splitModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">PDF分割設定</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">開始ページ</label>
                    <input type="number" id="split-from" class="form-control" value="1" min="1">
                    <label class="form-label mt-2">終了ページ</label>
                    <input type="number" id="split-to" class="form-control" value="-1" min="-1">
                    <small class="text-muted">※ -1 は最終ページを意味します</small>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                    <button type="button" id="confirm-split" class="btn btn-primary">分割実行</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 透かし設定モーダル -->
    <div class="modal fade" id="watermarkModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">テキスト透かし追加</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">透かし文字</label>
                    <input type="text" id="watermark-text" class="form-control" value="python-office">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                    <button type="button" id="confirm-watermark" class="btn btn-primary">透かし追加</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
